services:
  cursor2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor2api:latest
    container_name: cursor2api
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      # 挂载外部配置文件（推荐）——修改后只需 docker compose restart 即可生效
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      # - PROXY=http://host.docker.internal:7890
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6
      # - CONCURRENCY=3
      # - QUEUE_TIMEOUT=120000
      # - RETRY_DELAY=5000
      # - MAX_RETRY_DELAY=60000

  cursor2api-2:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor2api:latest
    container_name: cursor2api-2
    restart: unless-stopped
    ports:
      - "3011:3010"
    volumes:
      # 挂载外部配置文件（推荐）——修改后只需 docker compose restart 即可生效
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      # - PROXY=http://host.docker.internal:7890
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6
      # - CONCURRENCY=3
