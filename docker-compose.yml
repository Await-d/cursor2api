x-cursor2api-common: &cursor2api-common
  build:
    context: .
    dockerfile: Dockerfile
  image: cursor2api:latest
  restart: unless-stopped
  init: true
  stop_grace_period: 20s
  env_file:
    - ${DOCKER_ENV_FILE:-.env.docker}
  environment:
    NODE_ENV: production
    PORT: 3010
    ADMIN_ENV_FILE_PATH: /app/.env.docker
    AIRPORT_RUNTIME_WORK_DIR: ${AIRPORT_RUNTIME_WORK_DIR:-/app/.cursor2api-airport}
  volumes:
    - ${CONFIG_YAML_PATH:-./config.yaml}:/app/config.yaml
    - ${DOCKER_ENV_FILE:-./.env.docker}:/app/.env.docker
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  cursor2api:
    <<: *cursor2api-common
    container_name: cursor2api
    ports:
      - "${HOST_PORT_1:-3010}:3010"

  cursor2api-2:
    <<: *cursor2api-common
    container_name: cursor2api-2
    ports:
      - "${HOST_PORT_2:-3011}:3010"
