services:
  cursor2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor2api:latest
    container_name: cursor2api
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      # 挂载外部配置文件（推荐）——修改后只需 docker compose restart 即可生效
      - ./config.yaml:/app/config.yaml:ro
    env_file:
      - .env.docker
